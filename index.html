<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crazy Friend Surprise</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Verdana, sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;
      background:linear-gradient(135deg,#ff758c,#ff7eb3,#7afcff);
      position:relative;
    }

    .bg-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(50px);
      opacity:0.5;
      animation:moveCircle 10s infinite alternate ease-in-out;
    }

    .circle1{
      width:300px;
      height:300px;
      background:#ff4f8b;
      top:-50px;
      left:-50px;
    }

    .circle2{
      width:250px;
      height:250px;
      background:#7a5cff;
      bottom:-50px;
      right:-50px;
      animation-duration:12s;
    }

    .circle3{
      width:180px;
      height:180px;
      background:#00e1ff;
      top:40%;
      left:45%;
      animation-duration:8s;
    }

    @keyframes moveCircle{
      0%{
        transform:translate(0,0) scale(1);
      }
      100%{
        transform:translate(60px,-40px) scale(1.2);
      }
    }

    .container{
      position:relative;
      z-index:10;
      text-align:center;
      padding-top:50px;
      color:white;
    }

    h1{
      font-size:60px;
      text-shadow:0 0 20px rgba(255,255,255,0.7);
      animation:shake 2s infinite;
    }

    .subtitle{
      font-size:22px;
      margin-top:15px;
      color:#fff5f9;
    }

    .friend-card{
      width:350px;
      margin:40px auto;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      border-radius:30px;
      padding:25px;
      box-shadow:0 0 25px rgba(255,255,255,0.3);
      position:relative;
      overflow:hidden;
      animation:floatCard 4s infinite ease-in-out;
    }

    .friend-card img{
      width:180px;
      height:180px;
      object-fit:cover;
      border-radius:50%;
      border:6px solid white;
      box-shadow:0 0 25px rgba(255,255,255,0.8);
      animation:rotateImage 8s linear infinite;
    }

    .friend-card h2{
      margin-top:20px;
      font-size:30px;
    }

    .friend-card p{
      margin-top:10px;
      font-size:20px;
      color:#fff0f5;
    }

    .funny-message{
      margin-top:20px;
      background:rgba(255,255,255,0.2);
      padding:15px;
      border-radius:20px;
      font-size:20px;
      font-weight:bold;
      animation:glow 2s infinite alternate;
    }

    .btns{
      margin-top:25px;
    }

    button{
      padding:14px 28px;
      border:none;
      border-radius:30px;
      margin:10px;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      background:white;
      color:#ff4f8b;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
      background:#ffe4ef;
    }

    .floating-photo{
      position:absolute;
      width:120px;
      height:120px;
      object-fit:cover;
      border-radius:25px;
      border:4px solid white;
      box-shadow:0 0 20px rgba(255,255,255,0.6);
    }

    .photo1{
      top:12%;
      left:5%;
      animation:move1 7s infinite ease-in-out;
    }

    .photo2{
      top:18%;
      right:7%;
      animation:move2 8s infinite ease-in-out;
    }

    .photo3{
      bottom:10%;
      left:8%;
      animation:move3 9s infinite ease-in-out;
    }

    .photo4{
      bottom:12%;
      right:10%;
      animation:move4 6s infinite ease-in-out;
    }

    .photo5{
      top:65%;
      left:40%;
      animation:move5 10s infinite linear;
    }

    @keyframes move1{
      0%,100%{transform:translateY(0) rotate(0deg);}
      50%{transform:translateY(-40px) rotate(10deg);}
    }

    @keyframes move2{
      0%,100%{transform:translateX(0);}
      50%{transform:translateX(-40px) rotate(-10deg);}
    }

    @keyframes move3{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.2) rotate(10deg);}
    }

    @keyframes move4{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(30px);}
    }

    @keyframes move5{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    @keyframes floatCard{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-15px);}
    }

    @keyframes rotateImage{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    @keyframes shake{
      0%,100%{transform:rotate(0deg);}
      25%{transform:rotate(2deg);}
      75%{transform:rotate(-2deg);}
    }

    @keyframes glow{
      from{
        box-shadow:0 0 10px rgba(255,255,255,0.3);
      }
      to{
        box-shadow:0 0 25px rgba(255,255,255,0.8);
      }
    }

    .emoji-rain{
      position:absolute;
      top:-50px;
      font-size:35px;
      animation:fall linear infinite;
    }

    @keyframes fall{
      from{
        transform:translateY(-100px) rotate(0deg);
      }
      to{
        transform:translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="bg-circle circle1"></div>
  <div class="bg-circle circle2"></div>
  <div class="bg-circle circle3"></div>

  <img src="img1.jpeg" class="floating-photo photo1">
  <img src="img2.jpeg" class="floating-photo photo2">
  <img src="img3.jpeg" class="floating-photo photo3">
  <img src="img1.jpeg" class="floating-photo photo4">
  <img src="img2.jpeg" class="floating-photo photo5">

  <div class="container">
    <h1>My Crazy Best Friend</h1>
    <p class="subtitle">Life is impossible without your drama and funny moments 😂</p>

    <div class="friend-card">
      <img id="mainImage" src="img3.jpeg">
      <h2 id="friendName">Bestie Forever 💖</h2>
      <p>You are the funniest person in my life 😆</p>

      <div class="funny-message" id="funnyText">
        You are like WiFi... when you are gone everything stops 😭
      </div>

      <div class="btns">
        <button onclick="changeMessage()">New Funny Line</button>
        <button onclick="changeImage()">Change Photo</button>
      </div>
    </div>
  </div>

  <script>
    const messages = [
      "You are like WiFi... when you are gone everything stops 😭",
      "Your face is cute but your mind is dangerous 😂",
      "You are my unpaid therapist 😎",
      "Without you life is just loading...",
      "You are the queen of drama 👑",
      "If laziness was a competition, you would still sleep 😴",
      "You are my favorite problem 💖",
      "You make boring days crazy and fun 🔥"
    ];

    const images = [
      "https://i.pravatar.cc/300?img=16",
      "https://i.pravatar.cc/300?img=17",
      "https://i.pravatar.cc/300?img=18",
      "https://i.pravatar.cc/300?img=19",
      "https://i.pravatar.cc/300?img=20"
    ];

    function changeMessage(){
      const random = Math.floor(Math.random() * messages.length);
      document.getElementById("funnyText").innerText = messages[random];
    }

    function changeImage(){
      const random = Math.floor(Math.random() * images.length);
      document.getElementById("mainImage").src = images[random];
    }

    const emojis = ["😂","💖","🔥","😎","✨","😭","👑"];
    
    for(let i=0; i<25; i++){
      const emoji = document.createElement("div");
      emoji.classList.add("emoji-rain");
      emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.left = Math.random() * 100 + "vw";
      emoji.style.animationDuration = (Math.random() * 5 + 4) + "s";
      emoji.style.fontSize = (Math.random() * 20 + 20) + "px";
      document.body.appendChild(emoji);
    }
  </script>

</body>
</html>
