<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For My Friend ❤️</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #ff9a9e, #fad0c4);
    overflow: hidden;
  }
  .shayari-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    max-width: 90%;
    animation: fadeIn 2s ease-in-out;
  }

  .shayari-box h2 {
    color: #090909;
    font-size: 22px;
    line-height: 1.5;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .floating-img {
    position: absolute;
    width: 110px;
    border-radius: 15px;
    opacity: 0.9;
    animation-timing-function: linear;
    transition: transform 0.4s ease;
  }

  .floating-img:active {
    transform: scale(1.4) rotate(20deg);
  }

  @keyframes floatUp {
    from { transform: translateY(100vh) rotate(0deg); }
    to { transform: translateY(-150vh) rotate(360deg); }
  }

  @keyframes floatSide {
    from { transform: translateX(-200px) translateY(100vh); }
    to { transform: translateX(200px) translateY(-150vh); }
  }

  @media (max-width: 600px) {
    .shayari-box h2 { font-size: 18px; }
    .floating-img { width: 80px; }
  }
@keyframes heartFloat {
  from { opacity:1; transform:translateY(0) scale(1); }
  to { opacity:0; transform:translateY(-80px) scale(1.8); }
}
</style>
</head>
<body>

<div id="welcomeScreen" style="position:fixed;inset:0;background:linear-gradient(120deg,#ff9a9e,#fad0c4);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;">
  <h1 style="color:#fff;font-size:26px;margin-bottom:20px;">Welcome ❤️</h1>
  <button id="startBtn" style="padding:12px 24px;border:none;border-radius:30px;background:#fff;color:#ff4d6d;font-size:18px;cursor:pointer;">Start</button>
</div>

<audio id="bgMusic" loop>
  <source src="a1.mp3" type="audio/mpeg">
</audio>

<div id="musicControl" style="position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.3);cursor:pointer;z-index:1000;">
  🎵
</div>

<input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="1" style="position:fixed;bottom:95px;right:15px;width:90px;z-index:1000;">

<div class="shayari-box">
  <h2>
    अजनबी गलियों से हम गुज़रा नहीं करते,<br>
    दर्द-ए-दिल लिया और दिया नहीं करते,<br>
    ये प्यारा सा रिश्ता सिर्फ़ आप से है,<br>
    वरना इतना याद हम किसी को किया नहीं करते ❤️
  </h2>
</div>

<script>
  const music = document.getElementById('bgMusic');
const welcome = document.getElementById('welcomeScreen');
const startBtn = document.getElementById('startBtn');
const volumeSlider = document.getElementById('volumeSlider');

startBtn.addEventListener('click', () => {
  welcome.style.display = 'none';
  music.play();
});

volumeSlider.addEventListener('input', () => {
  music.volume = volumeSlider.value;
});
  const musicBtn = document.getElementById('musicControl');

  musicBtn.addEventListener('click', () => {
    if (music.paused) {
      music.play();
      musicBtn.textContent = '⏸';
    } else {
      music.pause();
      musicBtn.textContent = '🎵';
    }
  });

  // Soft fade-in when music starts
  music.volume = 0;
  let fade;
  music.addEventListener('play', () => {
    clearInterval(fade);
    fade = setInterval(() => {
      if (music.volume < 1) music.volume += 0.05;
      else clearInterval(fade);
    }, 200);
  });

  // Replace with your own photos
  const images = [
    'img1.jpeg',
    'img2.jpeg',
    'img3.jpeg',
    'img2.jpeg'
  ];

  function createFloatingImage() {
    const img = document.createElement('img');
    img.src = images[Math.floor(Math.random() * images.length)];
    img.className = 'floating-img';

    img.style.left = Math.random() * 90 + 'vw';
    img.style.animation = Math.random() > 0.5
      ? 'floatUp ' + (6 + Math.random() * 6) + 's linear'
      : 'floatSide ' + (6 + Math.random() * 6) + 's linear';

    img.addEventListener('touchstart', () => {
      img.style.transform = 'scale(1.5)';
    });

    document.body.appendChild(img);
    setTimeout(() => img.remove(), 14000);
  }

  setInterval(createFloatingImage, 900);

// Floating hearts on tap
function createHeart(x, y) {
  const heart = document.createElement('div');
  heart.textContent = '❤️';
  heart.style.position = 'fixed';
  heart.style.left = x + 'px';
  heart.style.top = y + 'px';
  heart.style.fontSize = '24px';
  heart.style.pointerEvents = 'none';
  heart.style.animation = 'heartFloat 1.2s ease-out forwards';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1200);
}

document.body.addEventListener('click', (e) => {
  createHeart(e.clientX, e.clientY);
});
</script>

</body>
</html>
