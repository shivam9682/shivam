<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Priya ❤️</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  max-width: 420px;
  animation: fadeIn 1.5s ease-in-out;
}

.slideshow {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto 10px;
}

.slideshow img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  border: 3px solid #ff4d6d;
}

.slideshow img.active {
  opacity: 1;
}

h1 { color: #ff4d6d; }

p { font-size: 16px; margin: 15px 0; }

.buttons { margin-top: 20px; }

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.yes { background: #28a745; color: white; }

.no {
  background: #dc3545;
  color: white;
  position: relative;
}

button:hover { transform: scale(1.1); }

.hidden {
  display: none;
  margin-top: 15px;
  color: green;
  font-weight: bold;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>
<body>

<div class="container">

  <div class="slideshow">
    <img src="img5.jpeg" class="active">
    <img src="img4.jpeg">
    <img src="img3.jpeg">
  </div>

  <h1>I'm Sorry Priya 💔</h1>
  <p>Kal jo hua uske liye mujhe sach me bahut bura lag raha hai.</p>
  <p>Mera intention tumhe hurt karna nahi tha... main bas tumhe lose nahi karna chahta.</p>
  <p>i am really sorry priya 😔</p>

  <div class="buttons">
    <button class="yes" onclick="forgive()">Forgive Me ❤️</button>
    <button class="no" onmouseover="moveButton(this)">No 😒</button>
  </div>

  <p id="message" class="hidden">Yay! Thank you Priya 😊💖</p>
</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let index = 0;
const slides = document.querySelectorAll(".slideshow img");

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 2000);

function forgive() {
  document.getElementById("message").classList.remove("hidden");
  createHearts();
}

function moveButton(btn) {
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

function createHearts() {
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }
}
</script>

</body>
</html>
