<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>another way · my heart for you</title>
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
  <!-- confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 30%, #f2e0ff, #d9d0ff 80%);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* soft floating stars (css only) */
    body::before, body::after {
      content: "✦";
      position: absolute;
      color: rgba(255, 240, 250, 0.6);
      font-size: 2.2rem;
      text-shadow: 0 0 10px #f0b0ff;
      animation: shine 5s infinite alternate;
    }
    body::before {
      top: 8%;
      left: 12%;
      transform: rotate(-10deg);
    }
    body::after {
      bottom: 12%;
      right: 10%;
      font-size: 3rem;
      animation: shine 7s infinite alternate-reverse;
    }
    @keyframes shine {
      0% { opacity: 0.2; transform: scale(1); }
      100% { opacity: 0.8; transform: scale(1.2); }
    }

    .container {
      width: 100%;
      max-width: 950px;
      background: rgba(255, 250, 255, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 50px 20px 50px 20px;
      box-shadow: 0 30px 45px rgba(120, 80, 150, 0.3), 0 0 0 2px #fff8 inset, 0 0 0 3px #f6d5ff inset;
      padding: 2rem 1.8rem;
      transition: all 0.3s;
      border: 2px solid #ffffffb3;
    }

    /* LOCKED SURPRISE (initial view) */
    .lock-cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.4s, transform 0.2s;
      padding: 2.5rem 1rem;
    }
    .lock-cover:hover {
      transform: scale(1.02);
    }
    .lock-icon {
      font-size: 9rem;
      color: #aa6dc9;
      filter: drop-shadow(0 15px 15px #b385d9);
      animation: gentle-swing 3s infinite ease-in-out;
      margin-bottom: 1rem;
    }
    @keyframes gentle-swing {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(-5deg); }
      100% { transform: rotate(0deg); }
    }
    .lock-cover h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 4rem;
      background: linear-gradient(135deg, #7d3f9e, #b4569c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 2px 2px 10px #f1c6ff;
      letter-spacing: 2px;
      margin: 0.3rem 0;
    }
    .lock-cover p {
      font-size: 1.7rem;
      color: #59367c;
      background: rgba(255, 235, 255, 0.7);
      padding: 0.3rem 2.5rem;
      border-radius: 60px;
      font-weight: 300;
      backdrop-filter: blur(2px);
      border: 1px solid #dbbaff;
    }

    /* CAROUSEL (hidden at first) */
    .carousel-container {
      display: none;  /* hidden until lock is clicked */
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .carousel-container.show {
      display: block;
      opacity: 1;
    }

    .carousel-title {
      font-family: 'Great Vibes', cursive;
      font-size: 3.5rem;
      text-align: center;
      color: #672b86;
      margin: 0 0 0.2rem;
      text-shadow: 0 2px 5px #f1d2ff;
    }
    .carousel-sub {
      text-align: center;
      font-size: 1.2rem;
      color: #7d5096;
      margin-bottom: 2rem;
      font-weight: 300;
      letter-spacing: 1px;
    }

    /* main carousel card */
    .carousel-card {
      background: rgba(255, 245, 255, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 40px 16px 40px 16px;
      padding: 2rem 1rem 1.5rem;
      box-shadow: 0 25px 40px -8px #8f67b1, 0 0 0 3px #fef7ff inset;
      max-width: 600px;
      margin: 0 auto 2rem;
    }

    .image-frame {
      width: 90%;
      margin: 0 auto 1.2rem;
      border-radius: 30px 10px 30px 10px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      border: 6px solid white;
      box-shadow: 0 15px 25px #b592cb;
      background: #f7e8ff;  /* soft background for contain mode */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;     /* ⬅️ ensures full face / whole image is visible */
      display: block;
      transition: transform 0.4s;
      background: #f7e8ff;      /* matches frame background */
    }
    .image-frame img:hover {
      transform: scale(1.03);   /* subtle zoom, still safe for face */
    }

    .carousel-caption {
      font-size: 1.8rem;
      font-family: 'Great Vibes', cursive;
      color: #4d2a63;
      background: #fff0fd;
      padding: 0.4rem 1.5rem;
      border-radius: 60px;
      display: inline-block;
      margin: 0.5rem 0 1rem;
      box-shadow: 0 5px 0 #bb92cf;
    }

    /* navigation */
    .carousel-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin: 1.8rem 0 1rem;
    }
    .nav-btn {
      background: #b689d1;
      border: none;
      color: white;
      font-size: 2.2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 0 #6f4a8b, 0 5px 15px #e1baf7;
      transition: 0.08s linear;
      border: 2px solid #fff2fc;
    }
    .nav-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #6f4a8b, 0 5px 12px #d3a6f0;
    }
    .nav-btn:disabled {
      opacity: 0.4;
      transform: translateY(4px);
      box-shadow: 0 4px 0 #6f4a8b;
      pointer-events: none;
    }

    .indicators {
      display: flex;
      justify-content: center;
      gap: 0.7rem;
      margin-top: 1rem;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d9b6f0;
      border: 2px solid white;
      cursor: pointer;
      transition: 0.2s;
    }
    .dot.active {
      background: #a13fc0;
      transform: scale(1.3);
      box-shadow: 0 0 12px #c87eff;
    }

    .back-to-lock {
      background: none;
      border: 2px dashed #9d74b3;
      color: #663f81;
      font-size: 1.3rem;
      padding: 0.6rem 2rem;
      border-radius: 60px;
      cursor: pointer;
      margin: 2rem auto 1rem;
      display: block;
      font-weight: 500;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .back-to-lock:hover {
      background: #eed5ff;
      border: 2px solid #b085cf;
      transform: scale(1.02);
    }

    .hidden {
      display: none;
    }

    /* tiny romantic footer */
    .foot-note {
      text-align: center;
      font-size: 1.1rem;
      color: #7e58a0;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LOCK / SURPRISE TRIGGER -->
    <div id="lockCover" class="lock-cover">
      <i class="fas fa-heart lock-icon"></i>
      <h2>my love, a secret</h2>
      <p>🔐 tap the heart to unlock 🔐</p>
    </div>

    <!-- CAROUSEL (hidden initially) -->
    <div id="carouselContainer" class="carousel-container">
      <div class="carousel-title">our story in pictures</div>
      <div class="carousel-sub"> ✨ every moment with you is magic ✨</div>

      <div class="carousel-card">
        <div class="image-frame" id="carouselImageFrame">
          <img id="carouselImg" src="" alt="us">
        </div>
        <div class="carousel-caption" id="carouselCaption"></div>

        <!-- prev/next -->
        <div class="carousel-controls">
          <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
          <button class="nav-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
        </div>
        <!-- dots -->
        <div class="indicators" id="dotContainer"></div>
      </div>

      <button class="back-to-lock" id="backToLockBtn"><i class="fas fa-lock"></i> close & back to heart</button>
      <div class="foot-note">
        <i class="fas fa-heart" style="color: #be79df;"></i> my favorite view is you <i class="fas fa-heart" style="color: #be79df;"></i>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- GIRLFRIEND'S IMAGES (replace with your own) ----------
      // Use images where her face is clearly visible — the frame now shows the whole picture.
      const images = [
        {
          url: "92804.jpg",
          caption: "💐 the first time you smiled like this"
        },
        {
          url: "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=600&h=600&fit=crop&auto=format",
          caption: "🌅 sunset walk, hand in hand"
        },
        {
          url: "https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=600&h=600&fit=crop&auto=format",
          caption: "☕ coffee dates & endless talks"
        },
        {
          url: "secondimage.jpeg",
          caption: "💞 that day you stole my heart"
        },
       
        {
          url: "92804.jpg",
          caption: "🏖️ our little getaway"
        }
      ];

      // DOM elements
      const lockCover = document.getElementById('lockCover');
      const carouselContainer = document.getElementById('carouselContainer');
      const carouselImg = document.getElementById('carouselImg');
      const carouselCaption = document.getElementById('carouselCaption');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const dotContainer = document.getElementById('dotContainer');
      const backToLockBtn = document.getElementById('backToLockBtn');

      let currentIndex = 0;

      // ---------- helper: update carousel view ----------
      function updateCarousel(index) {
        if (!images.length) return;
        // wrap index
        if (index < 0) index = images.length - 1;
        if (index >= images.length) index = 0;
        currentIndex = index;

        const item = images[currentIndex];
        carouselImg.src = item.url;
        carouselImg.alt = item.caption;
        carouselCaption.textContent = item.caption;

        // update dots
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
          if (i === currentIndex) dot.classList.add('active');
          else dot.classList.remove('active');
        });

        // disable prev/next if only one image (optional)
        if (images.length <= 1) {
          prevBtn.disabled = true;
          nextBtn.disabled = true;
        } else {
          prevBtn.disabled = false;
          nextBtn.disabled = false;
        }
      }

      // ---------- create dots ----------
      function renderDots() {
        let dotsHtml = '';
        images.forEach((_, idx) => {
          dotsHtml += `<div class="dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>`;
        });
        dotContainer.innerHTML = dotsHtml;

        // add click event to dots
        document.querySelectorAll('.dot').forEach(dot => {
          dot.addEventListener('click', (e) => {
            const index = parseInt(e.target.dataset.index, 10);
            if (!isNaN(index)) {
              updateCarousel(index);
            }
          });
        });
      }

      // ---------- prev/next listeners ----------
      prevBtn.addEventListener('click', () => {
        updateCarousel(currentIndex - 1);
      });
      nextBtn.addEventListener('click', () => {
        updateCarousel(currentIndex + 1);
      });

      // ---------- unlock surprise! (click lock) ----------
      lockCover.addEventListener('click', function() {
        // hide lock cover with smooth fade
        lockCover.style.opacity = '0';
        lockCover.style.pointerEvents = 'none';
        setTimeout(() => {
          lockCover.style.display = 'none';
        }, 300);

        // show carousel
        carouselContainer.classList.add('show');

        // initialize carousel (first time)
        renderDots();
        updateCarousel(0);

        // confetti burst (surprise!)
        confetti({
          particleCount: 130,
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#cb9eff', '#f2c1ff', '#ffffff', '#c98cff', '#b463e0']
        });
        setTimeout(() => {
          confetti({
            particleCount: 80,
            spread: 120,
            origin: { y: 0.5, x: 0.3 },
            colors: ['#e5b2ff', '#fbe5ff']
          });
          confetti({
            particleCount: 80,
            spread: 120,
            origin: { y: 0.5, x: 0.7 },
            colors: ['#e5b2ff', '#fbe5ff']
          });
        }, 180);
      });

      // ---------- back to lock ----------
      backToLockBtn.addEventListener('click', function() {
        carouselContainer.classList.remove('show');
        lockCover.style.display = 'flex';
        setTimeout(() => {
          lockCover.style.opacity = '1';
          lockCover.style.pointerEvents = 'auto';
        }, 20);
      });

      // optional: additional floating stars (js-made)
      function createStar() {
        const star = document.createElement('div');
        star.innerHTML = '✨';
        star.style.position = 'absolute';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.fontSize = (Math.random() * 2 + 1) + 'rem';
        star.style.opacity = '0.3';
        star.style.pointerEvents = 'none';
        star.style.zIndex = '0';
        star.style.animation = `shine ${Math.random() * 6 + 4}s infinite alternate`;
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 10000);
      }
      for (let i = 0; i < 8; i++) {
        setTimeout(createStar, i * 700);
      }
      setInterval(createStar, 5000);
    })();
  </script>
</body>
</html>
